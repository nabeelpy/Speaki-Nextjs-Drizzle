<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jelly Friend - Interactive 2D Character</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');
        
        body {
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            background: #fdf2f8; /* Soft pink-white background */
            overflow: hidden;
        }

        .blob-mesh {
            filter: url('#goo'); /* Optional: For even more liquid feel */
        }

        .glass-ui {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center relative">

    <div id="root" class="w-full h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, useSpring, useTransform } = window.Motion;

        // --- Component: The Face ---
        const Face = ({ mousePos, isSpeaking }) => {
            // Smooth spring for eye movement
            const springConfig = { stiffness: 200, damping: 20 };
            const lookX = useSpring(mousePos.x * 12, springConfig);
            const lookY = useSpring(mousePos.y * 8, springConfig);

            return (
                <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                    <div className="flex gap-10 mb-2">
                        {/* Eyes */}
                        {[0, 1].map((i) => (
                            <motion.div 
                                key={i}
                                className="w-5 h-7 bg-slate-900 rounded-full relative overflow-hidden"
                                animate={{ 
                                    scaleY: isSpeaking ? [1, 1, 0.1, 1] : [1, 1, 0.1, 1],
                                }}
                                transition={{ 
                                    repeat: Infinity, 
                                    duration: 3, 
                                    times: [0, 0.9, 0.95, 1],
                                    delay: i * 0.1 
                                }}
                            >
                                {/* Shine in eye */}
                                <motion.div 
                                    style={{ x: lookX, y: lookY }}
                                    className="absolute top-1 left-1 w-2 h-2 bg-white rounded-full" 
                                />
                            </motion.div>
                        ))}
                    </div>

                    {/* Mouth */}
                    <motion.div 
                        className="bg-slate-900 rounded-full"
                        animate={isSpeaking ? {
                            width: [24, 28, 24],
                            height: [12, 24, 12],
                            borderRadius: ["100% 100% 40% 40%"]
                        } : {
                            width: 20,
                            height: 6,
                            borderRadius: "10px"
                        }}
                        transition={{ repeat: isSpeaking ? Infinity : 0, duration: 0.15 }}
                    />
                </div>
            );
        };

        // --- Component: The Main Character ---
        const JellyBlob = ({ isSpeaking, mousePos }) => {
            const bounceSpring = { type: "spring", stiffness: 300, damping: 15 };

            return (
                <div className="relative w-80 h-80 flex items-center justify-center">
                    {/* Character Container with tilt */}
                    <motion.div
                        animate={{ 
                            rotate: mousePos.x * 5,
                            y: [0, -10, 0] 
                        }}
                        transition={{ 
                            rotate: { type: "spring" },
                            y: { repeat: Infinity, duration: 3, ease: "easeInOut" }
                        }}
                        className="relative w-64 h-64 cursor-pointer"
                    >
                        {/* Shadow */}
                        <motion.div 
                            className="absolute -bottom-8 left-1/2 -translate-x-1/2 w-48 h-6 bg-pink-200/50 rounded-[100%] blur-lg"
                            animate={{ scale: isSpeaking ? [1, 1.1, 1] : 1 }}
                        />

                        {/* Body Shape */}
                        <motion.div
                            className="w-full h-full bg-gradient-to-b from-pink-400 to-pink-500 shadow-xl shadow-pink-200"
                            animate={{
                                borderRadius: [
                                    "60% 40% 30% 70% / 60% 30% 70% 40%",
                                    "30% 60% 70% 40% / 50% 60% 30% 60%",
                                    "60% 40% 30% 70% / 60% 30% 70% 40%"
                                ],
                                scale: isSpeaking ? [1, 1.05, 0.98, 1] : 1
                            }}
                            transition={{
                                borderRadius: { repeat: Infinity, duration: 5, ease: "linear" },
                                scale: { duration: 0.4, repeat: isSpeaking ? Infinity : 0 }
                            }}
                        >
                            {/* Inner Glow */}
                            <div className="absolute inset-0 rounded-[inherit] border-t-8 border-white/30" />
                            
                            <Face mousePos={mousePos} isSpeaking={isSpeaking} />
                        </motion.div>
                    </motion.div>
                </div>
            );
        };

        // --- App Component ---
        const App = () => {
            const [text, setText] = useState("Hello! I'm your happy jelly friend.");
            const [isSpeaking, setIsSpeaking] = useState(false);
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });

            useEffect(() => {
                const handleMove = (e) => {
                    setMousePos({
                        x: (e.clientX / window.innerWidth) * 2 - 1,
                        y: (e.clientY / window.innerHeight) * 2 - 1
                    });
                };
                window.addEventListener('mousemove', handleMove);
                return () => window.removeEventListener('mousemove', handleMove);
            }, []);

            const speak = () => {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.pitch = 1.6;
                utterance.rate = 1;
                utterance.onstart = () => setIsSpeaking(true);
                utterance.onend = () => setIsSpeaking(false);
                window.speechSynthesis.speak(utterance);
            };

            return (
                <div className="flex flex-col h-full w-full items-center justify-between p-8">
                    <header className="text-center">
                        <h1 className="text-4xl font-bold text-pink-600 mb-2">Jelly Friend</h1>
                        <p className="text-pink-400 font-medium">Professional & Playful AI Blob</p>
                    </header>

                    <JellyBlob isSpeaking={isSpeaking} mousePos={mousePos} />

                    <div className="glass-ui w-full max-w-xl p-6 shadow-2xl shadow-pink-100 flex flex-col gap-4">
                        <textarea 
                            className="w-full bg-white/50 border-none p-4 rounded-xl text-slate-700 focus:ring-2 focus:ring-pink-300 transition-all outline-none resize-none font-medium"
                            rows="2"
                            value={text}
                            onChange={(e) => setText(e.target.value)}
                            placeholder="Tell me something..."
                        />
                        <div className="flex gap-4">
                            <motion.button
                                whileHover={{ scale: 1.02, backgroundColor: "#db2777" }}
                                whileTap={{ scale: 0.98 }}
                                onClick={speak}
                                className="flex-1 bg-pink-500 text-white font-bold py-4 rounded-2xl shadow-lg shadow-pink-200 transition-colors uppercase tracking-wider"
                            >
                                {isSpeaking ? "Speaking..." : "Start Talking"}
                            </motion.button>
                            {isSpeaking && (
                                <button 
                                    onClick={() => window.speechSynthesis.cancel() || setIsSpeaking(false)}
                                    className="px-6 text-pink-500 font-bold hover:bg-pink-50 rounded-2xl transition-all"
                                >
                                    STOP
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
