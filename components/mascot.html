<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaPals – French</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #f0f4ff;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }
        @keyframes blink {
            0%,88%,100% { transform: scaleY(1); }
            93% { transform: scaleY(0.08); }
        }
        @keyframes idle-bob {
            0%,100% { transform: translateY(0) rotate(-1deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }
        @keyframes wave-bar {
            0%,100% { transform: scaleY(0.25); }
            50% { transform: scaleY(1); }
        }
        .idle-bob { animation: idle-bob 2.4s ease-in-out infinite; }
        .eye-blink { animation: blink 3.5s ease-in-out infinite; transform-origin: center center; }
        textarea { font-family: 'Nunito', sans-serif; }
        textarea::-webkit-scrollbar { width: 4px; }
        textarea::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 4px; }
        button { font-family: 'Nunito', sans-serif; cursor: pointer; border: none; outline: none; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const { motion, AnimatePresence } = window.Motion;

const LANG = {
  label: "French", flag: "🇫🇷",
  color: "#5B9BF5", shadow: "rgba(91,155,245,0.45)", bg: "rgba(91,155,245,0.12)",
  shape: "M50,10 C74,9 91,26 91,50 C91,74 74,91 50,91 C26,91 9,74 9,50 C9,26 26,11 50,10Z",
  phrases: ["Bonjour!", "Merci beaucoup", "Comment ça va?", "Je t'aime", "Au revoir!"],
  greeting: "Bonjour! Prêt à parler français?",
  voice: { lang: 'fr-FR', rate: 0.95, pitch: 1.1 }
};

const MascotFace = ({ isSpeaking }) => {
  const mouthOpen  = "M 35 58 Q 50 70 65 58";
  const mouthSmile = "M 35 58 Q 50 66 65 58";
  const mouthMid   = "M 35 58 Q 50 63 65 58";
  const mouthWide  = "M 35 59 Q 50 74 65 59";

  return (
    <motion.div
      className={isSpeaking ? '' : 'idle-bob'}
      animate={isSpeaking ? {
        scaleX: [1, 1.07, 0.95, 1.04, 1],
        scaleY: [1, 0.94, 1.06, 0.97, 1],
      } : { scaleX: 1, scaleY: 1 }}
      transition={{ duration: 0.38, repeat: isSpeaking ? Infinity : 0, ease: 'easeInOut' }}
      style={{ width: 160, height: 160, transformOrigin: 'center center' }}
    >
      <svg viewBox="0 0 100 100" width="160" height="160" style={{ overflow: 'visible' }}>
        <defs>
          <filter id="glow-FR" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation={isSpeaking ? "6" : "4"} result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <radialGradient id="shine-FR" cx="38%" cy="32%" r="55%">
            <stop offset="0%" stopColor="white" stopOpacity="0.35"/>
            <stop offset="100%" stopColor={LANG.color} stopOpacity="0"/>
          </radialGradient>
        </defs>
        <path d={LANG.shape} fill={LANG.color} filter="url(#glow-FR)"/>
        <path d={LANG.shape} fill="url(#shine-FR)"/>
        <g className="eye-blink">
          <ellipse cx="36" cy="42" rx="6" ry="7" fill="white"/>
          <ellipse cx="64" cy="42" rx="6" ry="7" fill="white"/>
          <circle cx="37.5" cy="43.5" r="3.2" fill="#111"/>
          <circle cx="65.5" cy="43.5" r="3.2" fill="#111"/>
          <circle cx="39"   cy="41.5" r="1.3" fill="white"/>
          <circle cx="67"   cy="41.5" r="1.3" fill="white"/>
        </g>
        <motion.path
          d={mouthSmile}
          fill="none" stroke="white" strokeWidth="3.5" strokeLinecap="round"
          animate={isSpeaking ? { d: [mouthOpen, mouthMid, mouthWide, mouthSmile] } : { d: mouthSmile }}
          transition={{ duration: 0.22, repeat: isSpeaking ? Infinity : 0 }}
        />
        <ellipse cx="25" cy="57" rx="8" ry="5.5" fill="white" opacity="0.15"/>
        <ellipse cx="75" cy="57" rx="8" ry="5.5" fill="white" opacity="0.15"/>
      </svg>
    </motion.div>
  );
};

const Waveform = ({ isSpeaking }) => (
  <div style={{ display:'flex', alignItems:'center', gap:'4px', height:'28px' }}>
    {[0.5,0.9,1.3,0.7,1.5,0.8,1.1,0.55].map((h, i) => (
      <div key={i} style={{
        width: '3px', borderRadius: '3px', background: LANG.color,
        height: isSpeaking ? `${Math.round(h * 20)}px` : '4px',
        transformOrigin: 'bottom',
        animation: isSpeaking ? `wave-bar ${0.38 + i*0.055}s ease-in-out infinite alternate` : 'none',
        animationDelay: `${i * 0.06}s`,
        opacity: isSpeaking ? 0.9 : 0.25,
        transition: 'height 0.3s, opacity 0.3s',
      }}/>
    ))}
  </div>
);

const App = () => {
  const [text, setText] = useState(LANG.greeting);
  const [isSpeaking, setIsSpeaking] = useState(false);

  const speak = () => {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    const voices = window.speechSynthesis.getVoices();
    const match = voices.find(v => v.lang.startsWith('fr'));
    if (match) u.voice = match;
    u.lang = LANG.voice.lang; u.rate = LANG.voice.rate; u.pitch = LANG.voice.pitch;
    u.onstart = () => setIsSpeaking(true);
    u.onend = () => setIsSpeaking(false);
    u.onerror = () => setIsSpeaking(false);
    window.speechSynthesis.speak(u);
  };

  const stop = () => { window.speechSynthesis?.cancel(); setIsSpeaking(false); };

  return (
    <div style={{ width:'100%', maxWidth:'700px', padding:'24px 16px', margin:'0 auto' }}>

      {/* Header */}
      <div style={{ textAlign:'center', marginBottom:'28px' }}>
        <h1 style={{
          fontFamily:'Space Mono', fontSize:'clamp(18px,4vw,26px)', fontWeight:700,
          letterSpacing:'-0.02em', color: '#1a1a2e',
        }}>🗣 LinguaPals</h1>
        <p style={{ fontSize:'11px', color:'rgba(0,0,0,0.35)', letterSpacing:'0.14em', textTransform:'uppercase', marginTop:'4px' }}>
          learn by speaking
        </p>
      </div>


        <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
            <path d="M6 4h12v12H6z" />
        </svg>
      {/* Card */}
      <div style={{
        background: '#ffffff',
        border: '1px solid rgba(91,155,245,0.2)',
        borderRadius: '28px',
        padding: 'clamp(20px,5vw,40px)',
        boxShadow: `0 0 60px ${LANG.bg}, 0 20px 50px rgba(91,155,245,0.1)`,
        display: 'flex', gap: 'clamp(16px,5vw,48px)',
        flexWrap: 'wrap', alignItems: 'center', justifyContent: 'center',
      }}>

        {/* Mascot */}
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:'14px' }}>
          <div style={{ position:'relative', display:'flex', alignItems:'center', justifyContent:'center' }}>
            {isSpeaking && (
              <motion.div
                style={{ position:'absolute', width:'190px', height:'190px', borderRadius:'50%', border:`2px solid ${LANG.color}`, opacity:0.5 }}
                animate={{ scale:[1,1.35], opacity:[0.5,0] }}
                transition={{ duration:1, repeat:Infinity, ease:'easeOut' }}
              />
            )}
            <MascotFace isSpeaking={isSpeaking}/>
          </div>

          <Waveform isSpeaking={isSpeaking}/>

          <div style={{
            display:'flex', alignItems:'center', gap:'6px',
            background: 'rgba(91,155,245,0.08)', border:'1px solid rgba(91,155,245,0.18)',
            padding:'5px 14px', borderRadius:'20px',
          }}>
            <motion.div
              animate={{ scale: isSpeaking ? [1,1.4,1] : 1, opacity: isSpeaking ? 1 : 0.3 }}
              transition={{ duration:0.6, repeat:isSpeaking?Infinity:0 }}
              style={{ width:'6px', height:'6px', borderRadius:'50%', background:LANG.color, boxShadow:`0 0 8px ${LANG.color}` }}
            />
            <span style={{ fontSize:'11px', fontWeight:800, color: isSpeaking ? LANG.color : 'rgba(0,0,0,0.35)', textTransform:'uppercase', letterSpacing:'0.1em', fontFamily:'Space Mono' }}>
              {isSpeaking ? 'Speaking' : 'Ready'}
            </span>
          </div>
        </div>

        {/* Controls */}
        <div style={{ flex:1, minWidth:'240px', maxWidth:'370px', display:'flex', flexDirection:'column', gap:'18px' }}>
          <div>
            <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'4px' }}>
              <span style={{ fontSize:'22px' }}>{LANG.flag}</span>
              <h2 style={{ fontSize:'20px', fontWeight:900, color:'#1a1a2e' }}>Say it out loud!</h2>
            </div>
            <p style={{ fontSize:'13px', color:'rgba(0,0,0,0.4)', lineHeight:1.6 }}>
              Pick a phrase or type your own — then hit Speak and repeat after your guide.
            </p>
          </div>

          {/* Phrase chips */}
          <div>
            <div style={{ fontSize:'10px', fontWeight:800, color:'rgba(0,0,0,0.3)', textTransform:'uppercase', letterSpacing:'0.12em', marginBottom:'8px' }}>
              Quick phrases
            </div>
            <div style={{ display:'flex', flexWrap:'wrap', gap:'6px' }}>
              {LANG.phrases.map((p, i) => (
                <button key={i} onClick={() => setText(p)} style={{
                  background: text===p ? LANG.color : 'rgba(91,155,245,0.08)',
                  border: `1px solid ${text===p ? LANG.color : 'rgba(91,155,245,0.2)'}`,
                  color: text===p ? '#fff' : '#4a7ad4',
                  padding:'6px 13px', borderRadius:'20px', fontSize:'12px', fontWeight:700,
                  transition:'all 0.15s',
                  boxShadow: text===p ? `0 2px 12px ${LANG.shadow}` : 'none',
                }}>{p}</button>
              ))}
            </div>
          </div>

          {/* Text */}
          <div>
            <div style={{ fontSize:'10px', fontWeight:800, color:'rgba(0,0,0,0.3)', textTransform:'uppercase', letterSpacing:'0.12em', marginBottom:'8px' }}>
              What to say
            </div>
            <textarea value={text} onChange={e => setText(e.target.value)} rows={3} style={{
              width:'100%', resize:'none', outline:'none',
              background:'#f7f9ff', border:'1.5px solid rgba(91,155,245,0.2)',
              borderRadius:'14px', padding:'13px 15px',
              color:'#1a1a2e', fontSize:'15px', lineHeight:1.6,
              caretColor: LANG.color, transition:'border-color 0.2s',
            }}
              onFocus={e => e.target.style.borderColor = LANG.color}
              onBlur={e => e.target.style.borderColor = 'rgba(91,155,245,0.2)'}
            />
          </div>

          {/* Action buttons */}
          <div style={{ display:'flex', gap:'10px' }}>
            <motion.button
              onClick={speak}
              disabled={isSpeaking || !text.trim()}
              whileHover={!isSpeaking ? { y:-2, boxShadow:`0 10px 30px ${LANG.shadow}` } : {}}
              whileTap={!isSpeaking ? { scale:0.97 } : {}}
              style={{
                flex:1, padding:'14px 20px', borderRadius:'14px',
                background: isSpeaking ? 'rgba(91,155,245,0.15)' : LANG.color,
                color: isSpeaking ? LANG.color : '#fff',
                fontWeight:900, fontSize:'15px',
                boxShadow: !isSpeaking ? `0 6px 22px ${LANG.shadow}` : 'none',
                display:'flex', alignItems:'center', justifyContent:'center', gap:'8px',
                transition:'background 0.2s',
                opacity: (!text.trim()) ? 0.4 : 1,
              }}>
              {isSpeaking
                ? <><motion.span animate={{opacity:[1,0.3,1]}} transition={{duration:0.7,repeat:Infinity}} style={{width:'8px',height:'8px',borderRadius:'50%',background:LANG.color,display:'inline-block'}}/>Speaking…</>
                : <><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>Speak</>
              }
            </motion.button>
            <button onClick={stop} style={{
              padding:'14px 20px', borderRadius:'14px', fontWeight:700, fontSize:'14px',
              background:'rgba(0,0,0,0.05)', color:'rgba(0,0,0,0.4)',
              border:'1.5px solid rgba(0,0,0,0.1)', transition:'all 0.2s',
            }}
              onMouseEnter={e => { e.currentTarget.style.background='rgba(0,0,0,0.1)'; e.currentTarget.style.color='#1a1a2e'; }}
              onMouseLeave={e => { e.currentTarget.style.background='rgba(0,0,0,0.05)'; e.currentTarget.style.color='rgba(0,0,0,0.4)'; }}
            >■ Stop</button>
          </div>
        </div>
      </div>

      <p style={{ textAlign:'center', marginTop:'20px', fontSize:'11px', color:'rgba(0,0,0,0.2)', letterSpacing:'0.05em' }}>
        Best in Chrome or Safari · browser TTS
      </p>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
