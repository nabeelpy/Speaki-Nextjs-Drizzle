<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AvatarSpeak</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --accent: #5B9BF5;
            --accent-soft: rgba(91,155,245,0.12);
            --accent-border: rgba(91,155,245,0.22);
            --accent-shadow: rgba(91,155,245,0.35);
            --bg: #eef2ff;
            --card: #ffffff;
            --text: #1a1a2e;
            --text-muted: rgba(26,26,46,0.42);
            --text-faint: rgba(26,26,46,0.22);
            --chip-text: #3b72d4;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        @keyframes idle-bob {
            0%,100% { transform: translateY(0px) rotate(-1deg); }
            50%      { transform: translateY(-10px) rotate(1deg); }
        }
        @keyframes blink {
            0%,88%,100% { transform: scaleY(1); }
            93%          { transform: scaleY(0.08); }
        }
        @keyframes wave-bar {
            0%,100% { transform: scaleY(0.25); }
            50%      { transform: scaleY(1); }
        }
        @keyframes pulse-ring {
            0%   { transform: scale(1);    opacity: 0.5; }
            100% { transform: scale(1.38); opacity: 0; }
        }

        .idle-bob  { animation: idle-bob 2.4s ease-in-out infinite; }
        .eye-blink { animation: blink 3.5s ease-in-out infinite; transform-origin: center center; }

        textarea { font-family: 'Nunito', sans-serif; resize: none; }
        textarea::-webkit-scrollbar { width: 4px; }
        textarea::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 4px; }
        button { font-family: 'Nunito', sans-serif; cursor: pointer; border: none; outline: none; }

        .card {
            background: var(--card);
            border: 1px solid var(--accent-border);
            border-radius: 28px;
            padding: clamp(24px,5vw,44px);
            box-shadow: 0 0 60px var(--accent-soft), 0 20px 50px rgba(91,155,245,0.08);
        }

        .chip {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid var(--accent-border);
            background: var(--accent-soft);
            color: var(--chip-text);
        }
        .chip.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 2px 12px var(--accent-shadow);
        }

        .speak-btn {
            flex: 1;
            padding: 14px 20px;
            border-radius: 14px;
            font-weight: 900;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s, opacity 0.2s;
            background: var(--accent);
            color: #fff;
            box-shadow: 0 6px 22px var(--accent-shadow);
        }
        .speak-btn:disabled {
            opacity: 0.4;
            box-shadow: none;
        }
        .speak-btn.speaking {
            background: var(--accent-soft);
            color: var(--accent);
            box-shadow: none;
        }

        .stop-btn {
            padding: 14px 20px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 14px;
            background: rgba(0,0,0,0.05);
            color: rgba(0,0,0,0.38);
            border: 1.5px solid rgba(0,0,0,0.1);
            transition: all 0.2s;
        }
        .stop-btn:hover { background: rgba(0,0,0,0.1); color: var(--text); }

        .switcher {
            display: flex;
            gap: 6px;
            padding: 5px;
            background: rgba(255,255,255,0.85);
            border-radius: 50px;
            border: 1px solid rgba(91,155,245,0.15);
            box-shadow: 0 2px 12px rgba(91,155,245,0.1);
        }
        .switch-btn {
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 800;
            font-size: 12.5px;
            letter-spacing: 0.03em;
            transition: all 0.22s ease;
            background: transparent;
            color: var(--text-muted);
        }
        .switch-btn.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 3px 14px var(--accent-shadow);
        }

        .textarea-field {
            width: 100%;
            outline: none;
            background: #f7f9ff;
            border: 1.5px solid var(--accent-border);
            border-radius: 14px;
            padding: 13px 15px;
            color: var(--text);
            font-size: 15px;
            line-height: 1.6;
            caret-color: var(--accent);
            transition: border-color 0.2s;
        }
        .textarea-field:focus { border-color: var(--accent); }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--accent-soft);
            border: 1px solid var(--accent-border);
            padding: 5px 14px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
    const { useState, useEffect } = React;
    const { motion, AnimatePresence } = window.Motion;

    const ACCENT = '#5B9BF5';
    const ACCENT_SHADOW = 'rgba(91,155,245,0.45)';

    /* ── AVATAR 1: LINGUA blob ── */
    const LinguaCharacter = ({ isSpeaking }) => {
        const shape = "M50,10 C74,9 91,26 91,50 C91,74 74,91 50,91 C26,91 9,74 9,50 C9,26 26,11 50,10Z";
        return (
            <motion.div
                className={isSpeaking ? '' : 'idle-bob'}
                animate={isSpeaking ? { scaleX:[1,1.07,0.95,1.04,1], scaleY:[1,0.94,1.06,0.97,1] } : { scaleX:1, scaleY:1 }}
                transition={{ duration:0.38, repeat: isSpeaking ? Infinity : 0, ease:'easeInOut' }}
                style={{ width:160, height:160, transformOrigin:'center center' }}
            >
                <svg viewBox="0 0 100 100" width="160" height="160" style={{ overflow:'visible' }}>
                    <defs>
                        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur stdDeviation={isSpeaking ? "6" : "4"} result="blur"/>
                            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                        </filter>
                        <radialGradient id="shine" cx="38%" cy="32%" r="55%">
                            <stop offset="0%" stopColor="white" stopOpacity="0.35"/>
                            <stop offset="100%" stopColor={ACCENT} stopOpacity="0"/>
                        </radialGradient>
                    </defs>
                    <path d={shape} fill={ACCENT} filter="url(#glow)"/>
                    <path d={shape} fill="url(#shine)"/>
                    <g className="eye-blink">
                        <ellipse cx="36" cy="42" rx="6" ry="7" fill="white"/>
                        <ellipse cx="64" cy="42" rx="6" ry="7" fill="white"/>
                        <circle cx="37.5" cy="43.5" r="3.2" fill="#111"/>
                        <circle cx="65.5" cy="43.5" r="3.2" fill="#111"/>
                        <circle cx="39" cy="41.5" r="1.3" fill="white"/>
                        <circle cx="67" cy="41.5" r="1.3" fill="white"/>
                    </g>
                    <motion.path
                        fill="none" stroke="white" strokeWidth="3.5" strokeLinecap="round"
                        animate={isSpeaking
                            ? { d:["M 35 58 Q 50 70 65 58","M 35 58 Q 50 63 65 58","M 35 59 Q 50 74 65 59","M 35 58 Q 50 66 65 58"] }
                            : { d:"M 35 58 Q 50 66 65 58" }}
                        transition={{ duration:0.22, repeat: isSpeaking ? Infinity : 0 }}
                    />
                    <ellipse cx="25" cy="57" rx="8" ry="5.5" fill="white" opacity="0.15"/>
                    <ellipse cx="75" cy="57" rx="8" ry="5.5" fill="white" opacity="0.15"/>
                </svg>
            </motion.div>
        );
    };

    /* ── AVATAR 2: JELLY blob — same blue color, morphing shape ── */
    const JellyCharacter = ({ isSpeaking, mousePos }) => {
        const lookX = (mousePos?.x || 0) * 5;
        const lookY = (mousePos?.y || 0) * 4;
        return (
            <motion.div
                className={isSpeaking ? '' : 'idle-bob'}
                style={{ width:160, height:160, position:'relative', transformOrigin:'center center' }}
                animate={isSpeaking ? { scaleX:[1,1.07,0.95,1.04,1], scaleY:[1,0.94,1.06,0.97,1] } : { scaleX:1, scaleY:1 }}
                transition={{ duration:0.38, repeat: isSpeaking ? Infinity : 0, ease:'easeInOut' }}
            >
                <motion.div
                    animate={{
                        borderRadius:[
                            '60% 40% 30% 70% / 60% 30% 70% 40%',
                            '30% 60% 70% 40% / 50% 60% 30% 60%',
                            '60% 40% 30% 70% / 60% 30% 70% 40%',
                        ],
                    }}
                    transition={{ borderRadius:{ repeat:Infinity, duration:5, ease:'linear' } }}
                    style={{
                        width:'100%', height:'100%',
                        background: ACCENT,
                        filter: `drop-shadow(0 0 ${isSpeaking?'14px':'8px'} rgba(91,155,245,0.6))`,
                        position:'relative',
                        overflow: 'hidden',
                    }}
                >
                    {/* shine */}
                    <div style={{ position:'absolute', inset:0, borderRadius:'inherit', background:'radial-gradient(circle at 38% 28%, rgba(255,255,255,0.32) 0%, transparent 58%)' }}/>
                    <div style={{ position:'absolute', inset:0, borderRadius:'inherit', borderTop:'7px solid rgba(255,255,255,0.2)' }}/>

                    {/* Face */}
                    <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', paddingBottom:'8px' }}>
                        {/* Eyes */}
                        <div style={{ display:'flex', gap:'22px', marginBottom:'8px' }}>
                            {[0,1].map(i => (
                                <motion.div key={i}
                                            style={{ width:'20px', height:'26px', background:'white', borderRadius:'50%', position:'relative', overflow:'hidden' }}
                                            animate={{ scaleY:[1,1,0.08,1] }}
                                            transition={{ repeat:Infinity, duration:3.5, times:[0,0.88,0.93,1], delay:i*0.1 }}
                                >
                                    <div style={{ position:'absolute', top:'4px', left:'4px', width:'9px', height:'9px', background:'#111', borderRadius:'50%' }}/>
                                    <motion.div style={{ position:'absolute', top:'3px', left:'3px', width:'5px', height:'5px', background:'white', borderRadius:'50%', x: lookX, y: lookY }}/>
                                </motion.div>
                            ))}
                        </div>
                        {/* Mouth */}
                        <motion.div
                            style={{ background:'white', borderRadius:'50px', opacity:0.92 }}
                            animate={isSpeaking ? { width:[20,28,20], height:[7,20,7] } : { width:18, height:6 }}
                            transition={{ repeat: isSpeaking ? Infinity : 0, duration:0.2 }}
                        />

                    </div>
                </motion.div>
            </motion.div>
        );
    };

    /* ── SHARED WAVEFORM ── */
    const Waveform = ({ isSpeaking }) => (
        <div style={{ display:'flex', alignItems:'center', gap:'4px', height:'28px' }}>
            {[0.5,0.9,1.3,0.7,1.5,0.8,1.1,0.55].map((h, i) => (
                <div key={i} style={{
                    width:'3px', borderRadius:'3px', background: ACCENT,
                    height: isSpeaking ? `${Math.round(h*20)}px` : '4px',
                    transformOrigin:'bottom',
                    animation: isSpeaking ? `wave-bar ${0.38+i*0.055}s ease-in-out infinite alternate` : 'none',
                    animationDelay:`${i*0.06}s`,
                    opacity: isSpeaking ? 0.9 : 0.25,
                    transition:'height 0.3s, opacity 0.3s',
                }}/>
            ))}
        </div>
    );

    const AVATARS = [
        { id:'lingua', label:'🇫🇷 LinguaPals' },
        { id:'jelly',  label:'🫧 Jelly Friend' },
    ];

    const PHRASES = {
        lingua: ["Bonjour!", "Merci beaucoup", "Comment ça va?", "Je t'aime", "Au revoir!"],
        jelly:  ["Hello there!", "How are you?", "Nice to meet you!", "Let's have fun!", "See you soon!"],
    };

    const DEFAULTS = {
        lingua: "Bonjour! Prêt à parler français?",
        jelly:  "Hello! I'm your happy jelly friend.",
    };

    const App = () => {
        const [activeId, setActiveId]     = useState('lingua');
        const [text, setText]             = useState(DEFAULTS.lingua);
        const [isSpeaking, setIsSpeaking] = useState(false);
        const [mousePos, setMousePos]     = useState({ x:0, y:0 });

        useEffect(() => {
            const fn = e => setMousePos({ x:(e.clientX/window.innerWidth)*2-1, y:(e.clientY/window.innerHeight)*2-1 });
            window.addEventListener('mousemove', fn);
            return () => window.removeEventListener('mousemove', fn);
        }, []);

        const speak = () => {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            if (activeId === 'lingua') {
                const v = window.speechSynthesis.getVoices().find(v => v.lang.startsWith('fr'));
                if (v) u.voice = v;
                u.lang = 'fr-FR'; u.rate = 0.95; u.pitch = 1.1;
            } else {
                u.pitch = 1.6; u.rate = 1;
            }
            u.onstart = () => setIsSpeaking(true);
            u.onend   = () => setIsSpeaking(false);
            u.onerror = () => setIsSpeaking(false);
            window.speechSynthesis.speak(u);
        };

        const stop = () => { window.speechSynthesis?.cancel(); setIsSpeaking(false); };

        const switchAvatar = id => { stop(); setActiveId(id); setText(DEFAULTS[id]); };

        return (
            <div style={{ width:'100%', maxWidth:'740px', padding:'28px 16px', margin:'0 auto' }}>

                {/* Header */}
                <div style={{ textAlign:'center', marginBottom:'28px' }}>
                    <h1 style={{ fontFamily:'Space Mono', fontSize:'clamp(17px,3.5vw,24px)', fontWeight:700, letterSpacing:'-0.02em', color:'var(--text)' }}>
                        🗣 AvatarSpeak
                    </h1>
                    <p style={{ fontSize:'11px', color:'var(--text-faint)', letterSpacing:'0.14em', textTransform:'uppercase', marginTop:'4px' }}>
                        your tts companions
                    </p>
                </div>

                {/* Switcher */}
                <div style={{ display:'flex', justifyContent:'center', marginBottom:'28px' }}>
                    <div className="switcher">
                        {AVATARS.map(a => (
                            <button key={a.id} className={`switch-btn${activeId===a.id?' active':''}`} onClick={() => switchAvatar(a.id)}>
                                {a.label}
                            </button>
                        ))}
                    </div>
                </div>

                {/* Main card */}
                <div className="card" style={{ display:'flex', gap:'clamp(16px,5vw,48px)', flexWrap:'wrap', alignItems:'center', justifyContent:'center' }}>

                    {/* Character column */}
                    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:'14px' }}>
                        <div style={{ position:'relative', display:'flex', alignItems:'center', justifyContent:'center' }}>
                            {isSpeaking && (
                                <div style={{ position:'absolute', width:'200px', height:'200px', borderRadius:'50%', border:`2px solid ${ACCENT}`, animation:'pulse-ring 1s ease-out infinite', pointerEvents:'none' }}/>
                            )}
                            <AnimatePresence mode="wait">
                                <motion.div key={activeId}
                                            initial={{ opacity:0, scale:0.82 }}
                                            animate={{ opacity:1, scale:1 }}
                                            exit={{ opacity:0, scale:0.82 }}
                                            transition={{ duration:0.25, ease:'easeInOut' }}
                                >
                                    {activeId === 'lingua'
                                        ? <LinguaCharacter isSpeaking={isSpeaking}/>
                                        : <JellyCharacter  isSpeaking={isSpeaking} mousePos={mousePos}/>
                                    }
                                </motion.div>
                            </AnimatePresence>
                        </div>

                        <Waveform isSpeaking={isSpeaking}/>

                        <div className="status-pill">
                            <motion.div
                                animate={{ scale: isSpeaking ? [1,1.4,1] : 1, opacity: isSpeaking ? 1 : 0.3 }}
                                transition={{ duration:0.6, repeat: isSpeaking ? Infinity : 0 }}
                                style={{ width:'6px', height:'6px', borderRadius:'50%', background:ACCENT, boxShadow:`0 0 8px ${ACCENT}` }}
                            />
                            <span style={{ fontSize:'11px', fontWeight:800, color: isSpeaking ? ACCENT : 'var(--text-muted)', textTransform:'uppercase', letterSpacing:'0.1em', fontFamily:'Space Mono' }}>
              {isSpeaking ? 'Speaking' : 'Ready'}
            </span>
                        </div>
                    </div>

                    {/* Controls column — 100% identical for both avatars */}
                    <div style={{ flex:1, minWidth:'240px', maxWidth:'370px', display:'flex', flexDirection:'column', gap:'18px' }}>

                        <div>
                            <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'4px' }}>
                                <h2 style={{ fontSize:'20px', fontWeight:900, color:'var(--text)' }}>Say it out loud!</h2>
                            </div>
                            <p style={{ fontSize:'13px', color:'var(--text-muted)', lineHeight:1.6 }}>
                                Pick a phrase or type your own — then hit Speak and repeat after your guide.
                            </p>
                        </div>

                        <div>
                            <div style={{ fontSize:'10px', fontWeight:800, color:'var(--text-faint)', textTransform:'uppercase', letterSpacing:'0.12em', marginBottom:'8px' }}>
                                Quick phrases
                            </div>
                            <div style={{ display:'flex', flexWrap:'wrap', gap:'6px' }}>
                                {PHRASES[activeId].map((p, i) => (
                                    <button key={i} onClick={() => setText(p)} className={`chip${text===p?' active':''}`}>{p}</button>
                                ))}
                            </div>
                        </div>

                        <div>
                            <div style={{ fontSize:'10px', fontWeight:800, color:'var(--text-faint)', textTransform:'uppercase', letterSpacing:'0.12em', marginBottom:'8px' }}>
                                What to say
                            </div>
                            <textarea
                                className="textarea-field"
                                value={text}
                                onChange={e => setText(e.target.value)}
                                rows={3}
                            />
                        </div>

                        <div style={{ display:'flex', gap:'10px' }}>
                            <motion.button
                                className={`speak-btn${isSpeaking?' speaking':''}`}
                                onClick={speak}
                                disabled={isSpeaking || !text.trim()}
                                whileHover={!isSpeaking ? { y:-2, boxShadow:`0 10px 30px ${ACCENT_SHADOW}` } : {}}
                                whileTap={!isSpeaking ? { scale:0.97 } : {}}
                            >
                                {isSpeaking
                                    ? <><motion.span animate={{opacity:[1,0.3,1]}} transition={{duration:0.7,repeat:Infinity}} style={{width:'8px',height:'8px',borderRadius:'50%',background:ACCENT,display:'inline-block'}}/>Speaking…</>
                                    : <><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>Speak</>
                                }
                            </motion.button>
                            <button className="stop-btn" onClick={stop}>■ Stop</button>
                        </div>
                    </div>
                </div>

                <p style={{ textAlign:'center', marginTop:'20px', fontSize:'11px', color:'var(--text-faint)', letterSpacing:'0.05em' }}>
                    Best in Chrome or Safari · browser TTS
                </p>
            </div>
        );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
